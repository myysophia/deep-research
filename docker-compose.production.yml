# ============================================
# AI Thesis Writer - Production Docker Compose
# ============================================

version: "3.9"

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AI论文撰写智能体}
        NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-AI-powered academic thesis writing assistant}
        NEXT_PUBLIC_VERSION: ${NEXT_PUBLIC_VERSION:-1.0.0}
    image: crpi-ywue2o6mpn8qaq0l.cn-hangzhou.personal.cr.aliyuncs.com/tangshu/deep-research:latest
    container_name: ai-thesis-writer
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Server Configuration
      - NODE_ENV=production
      - PORT=3000

      # Supabase Configuration (required for auth)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://jaotyxuadwoiwzrrzdma.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_URL=${SUPABASE_URL:-https://jaotyxuadwoiwzrrzdma.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # OEM Branding
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-AI论文撰写智能体}
      - NEXT_PUBLIC_APP_TITLE=${NEXT_PUBLIC_APP_TITLE}
      - NEXT_PUBLIC_APP_DESCRIPTION=${NEXT_PUBLIC_APP_DESCRIPTION}
      - NEXT_PUBLIC_APP_LOGO=${NEXT_PUBLIC_APP_LOGO}
      - NEXT_PUBLIC_APP_THEME_COLOR=${NEXT_PUBLIC_APP_THEME_COLOR}
      - NEXT_PUBLIC_APP_BACKGROUND_COLOR=${NEXT_PUBLIC_APP_BACKGROUND_COLOR}
      - NEXT_PUBLIC_APP_FOOTER=${NEXT_PUBLIC_APP_FOOTER}
      - NEXT_PUBLIC_APP_REPO_URL=${NEXT_PUBLIC_APP_REPO_URL}
      - NEXT_PUBLIC_APP_DOCS_URL=${NEXT_PUBLIC_APP_DOCS_URL}

      # Optional: Access Password
      - ACCESS_PASSWORD=${ACCESS_PASSWORD}

      # Optional: AI Provider API Keys
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}

      # Optional: Search Provider API Keys
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
    volumes:
      - thesis-data:/app/data
    networks:
      - thesis-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-thesis-writer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - thesis-network
    profiles:
      - with-nginx

  # Optional: SearXNG Search Engine
  searxng:
    image: searxng/searxng:latest
    container_name: ai-thesis-writer-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - thesis-network
    environment:
      - BASE_URL=http://localhost:8080
    profiles:
      - with-search

networks:
  thesis-network:
    driver: bridge

volumes:
  thesis-data:
    driver: local
